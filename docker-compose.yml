services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fileshare}
      POSTGRES_USER: ${POSTGRES_USER:-fileshare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fileshare}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: postgres,redis,minio
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fileshare}
      DB_USERNAME: ${POSTGRES_USER:-fileshare}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-fileshare}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-files}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-local-compose-secret-change-before-production}
      APP_JWT_EXPIRES_IN_SECONDS: ${APP_JWT_EXPIRES_IN_SECONDS:-3600}
      APP_FILE_MAX_SIZE_BYTES: ${APP_FILE_MAX_SIZE_BYTES:-10485760}
      APP_FILE_ALLOWED_EXTENSIONS: ${APP_FILE_ALLOWED_EXTENSIONS:-pdf,png,jpg,jpeg,txt,csv}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
  minio-data:

<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="700" viewBox="0 0 1180 700" role="img" aria-labelledby="title desc">
  <title id="title">AWS Architecture</title>
  <desc id="desc">AWS architecture with Route53, ACM, ALB, ECS Fargate, Aurora PostgreSQL, ElastiCache Redis, S3, Lambda, and CloudWatch.</desc>
  <style>
    .bg { fill: #f8fafc; }
    .zone { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 12; }
    .public { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; rx: 10; }
    .private { fill: #f0fdf4; stroke: #86efac; stroke-width: 2; rx: 10; }
    .db { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; rx: 10; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .svc { fill: #fefce8; stroke: #a16207; stroke-width: 2; rx: 8; }
    .edge { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .data { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrow2); }
    .event { stroke: #7c3aed; stroke-width: 3; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow3); }
    .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
    .label { font: 700 17px Arial, sans-serif; fill: #0f172a; }
    .small { font: 13px Arial, sans-serif; fill: #475569; }
    .tag { font: 700 13px Arial, sans-serif; fill: #334155; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/>
    </marker>
    <marker id="arrow3" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect class="bg" width="1180" height="700"/>
  <text class="title" x="48" y="58">AWS Cloud Native Architecture</text>
  <text class="small" x="48" y="84">Managed runtime, managed data services, event-driven file processing, and centralized observability.</text>

  <rect class="zone" x="48" y="118" width="1084" height="500"/>
  <text class="tag" x="72" y="148">VPC: public, private, and database subnet separation</text>

  <rect class="public" x="78" y="180" width="250" height="360"/>
  <text class="tag" x="102" y="210">Public subnet</text>
  <rect class="private" x="374" y="180" width="270" height="360"/>
  <text class="tag" x="398" y="210">Private subnet</text>
  <rect class="db" x="690" y="180" width="250" height="360"/>
  <text class="tag" x="714" y="210">Database subnet</text>

  <rect class="box" x="92" y="245" width="190" height="74"/>
  <text class="label" x="138" y="276">Route53</text>
  <text class="small" x="124" y="299">DNS routing</text>

  <rect class="box" x="92" y="345" width="190" height="74"/>
  <text class="label" x="152" y="376">ALB</text>
  <text class="small" x="120" y="399">HTTPS + health</text>

  <rect class="box" x="412" y="280" width="190" height="100"/>
  <text class="label" x="450" y="315">ECS Fargate</text>
  <text class="small" x="442" y="340">Spring Boot API</text>
  <text class="small" x="450" y="360">rolling deploy</text>

  <rect class="box" x="720" y="240" width="190" height="84"/>
  <text class="label" x="764" y="274">Aurora</text>
  <text class="small" x="748" y="299">metadata database</text>

  <rect class="box" x="720" y="370" width="190" height="84"/>
  <text class="label" x="748" y="404">ElastiCache</text>
  <text class="small" x="748" y="429">metadata cache</text>

  <rect class="svc" x="982" y="238" width="120" height="76"/>
  <text class="label" x="1022" y="270">S3</text>
  <text class="small" x="1008" y="292">file bytes</text>

  <rect class="svc" x="982" y="374" width="120" height="76"/>
  <text class="label" x="1008" y="406">Lambda</text>
  <text class="small" x="1005" y="428">processor</text>

  <rect class="svc" x="412" y="474" width="190" height="58"/>
  <text class="label" x="450" y="508">CloudWatch</text>

  <path class="edge" d="M282 282 C326 282 342 284 374 300"/>
  <path class="edge" d="M282 382 H412"/>
  <path class="data" d="M602 312 H720"/>
  <path class="data" d="M602 352 C652 390 672 412 720 412"/>
  <path class="data" d="M602 330 C750 330 850 276 982 276"/>
  <path class="event" d="M1042 314 V374"/>
  <path class="event" d="M982 412 C770 458 680 502 602 502"/>
  <path class="event" d="M507 380 V474"/>

  <text class="small" x="324" y="266">ACM cert</text>
  <text class="small" x="326" y="368">target group</text>
  <text class="small" x="620" y="300">SQL metadata</text>
  <text class="small" x="624" y="386">Redis key</text>
  <text class="small" x="748" y="260">files.storage_path</text>
  <text class="small" x="922" y="260">object key</text>
  <text class="small" x="1054" y="350">ObjectCreated</text>

  <rect x="78" y="572" width="1024" height="26" fill="#dcfce7" rx="6"/>
  <text class="small" x="96" y="590">Security boundary: ALB is public; ECS is private; Aurora and ElastiCache stay in database subnets; S3 access is IAM prefix-scoped.</text>
</svg>

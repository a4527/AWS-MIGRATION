<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img" aria-labelledby="title desc">
  <title id="title">On-premises Architecture</title>
  <desc id="desc">Docker Compose based on-premises architecture with Nginx, Spring Boot, PostgreSQL, Redis, and MinIO.</desc>
  <style>
    .bg { fill: #f8fafc; }
    .band { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
    .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
    .edge { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .data { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
    .label { font: 700 18px Arial, sans-serif; fill: #0f172a; }
    .small { font: 14px Arial, sans-serif; fill: #475569; }
    .tag { font: 700 13px Arial, sans-serif; fill: #1d4ed8; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect class="bg" width="1180" height="640"/>
  <text class="title" x="48" y="58">On-premises File Sharing Architecture</text>
  <text class="small" x="48" y="84">Single local stack for implementation, integration testing, and migration baseline.</text>

  <rect class="band" x="48" y="120" width="1084" height="440" rx="12"/>
  <text class="tag" x="72" y="152">Docker Compose network</text>

  <rect class="box" x="82" y="250" width="160" height="96"/>
  <text class="label" x="126" y="290">Client</text>
  <text class="small" x="112" y="316">Browser / curl</text>

  <rect class="box" x="306" y="250" width="170" height="96"/>
  <text class="label" x="360" y="290">Nginx</text>
  <text class="small" x="336" y="316">Reverse proxy</text>

  <rect class="box" x="540" y="250" width="190" height="96"/>
  <text class="label" x="578" y="290">Spring Boot</text>
  <text class="small" x="584" y="316">API + auth + file</text>

  <rect class="box" x="814" y="150" width="190" height="88"/>
  <text class="label" x="858" y="186">PostgreSQL</text>
  <text class="small" x="844" y="211">users, files metadata</text>

  <rect class="box" x="814" y="280" width="190" height="88"/>
  <text class="label" x="884" y="316">Redis</text>
  <text class="small" x="846" y="341">files:metadata:{id}</text>

  <rect class="box" x="814" y="410" width="190" height="88"/>
  <text class="label" x="882" y="446">MinIO</text>
  <text class="small" x="856" y="471">file object bytes</text>

  <path class="edge" d="M242 298 H306"/>
  <path class="edge" d="M476 298 H540"/>
  <path class="data" d="M730 276 C770 246 780 194 814 194"/>
  <path class="data" d="M730 302 H814"/>
  <path class="data" d="M730 326 C770 370 780 454 814 454"/>

  <text class="small" x="254" y="284">HTTP :8080</text>
  <text class="small" x="484" y="284">/api, /actuator</text>
  <text class="small" x="742" y="226">metadata</text>
  <text class="small" x="742" y="292">cache</text>
  <text class="small" x="742" y="398">object key</text>

  <rect x="72" y="514" width="1030" height="26" fill="#e0f2fe" rx="6"/>
  <text class="small" x="90" y="532">Migration baseline: API contract, PostgreSQL schema, Redis key pattern, and object key are preserved when moving to AWS.</text>
</svg>

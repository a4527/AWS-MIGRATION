spring:
  application:
    name: file-share-api
  datasource:
    url: jdbc:h2:mem:fileshare;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  cache:
    type: simple

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.example.fileshare: INFO

app:
  jwt:
    secret: ${APP_JWT_SECRET:local-development-secret-change-before-production}
    expires-in-seconds: ${APP_JWT_EXPIRES_IN_SECONDS:3600}
  file:
    max-size-bytes: ${APP_FILE_MAX_SIZE_BYTES:10485760}
    allowed-extensions: ${APP_FILE_ALLOWED_EXTENSIONS:pdf,png,jpg,jpeg,txt,csv}
  storage:
    local-root: ${APP_STORAGE_LOCAL_ROOT:build/local-storage}

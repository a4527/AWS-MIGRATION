spring:
  application:
    name: file-share-api
  datasource:
    url: jdbc:h2:mem:fileshare;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  cache:
    type: simple

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.example.fileshare: INFO

app:
  jwt:
    secret: local-development-secret-change-before-production
    expires-in-seconds: 3600
  file:
    max-size-bytes: 10485760
    allowed-extensions: pdf,png,jpg,jpeg,txt,csv
  storage:
    local-root: build/local-storage

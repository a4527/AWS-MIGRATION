spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fileshare}
    username: ${DB_USERNAME:fileshare}
    password: ${DB_PASSWORD:fileshare}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
